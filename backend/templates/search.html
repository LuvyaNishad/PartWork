<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PartWork - Search</title>
</head>
<body class="bg-[#F0F4F8] text-slate-800 font-sans min-h-screen">
    
    <nav class="flex justify-between items-center px-10 py-6 max-w-7xl mx-auto">
        <a href="/" class="text-2xl font-bold text-blue-600">PartWork</a>
        <div class="flex gap-6 text-sm font-medium text-slate-600">
            <a href="/" class="hover:text-blue-600">Home</a> 
            <a href="/search" class="text-blue-600 font-bold">Search</a> 
            <a href="/account" class="hover:text-blue-600">Dashboard</a>
            <a href="/logout" class="hover:text-slate-900 ml-4">Logout</a>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-10 py-6">
        <h1 class="text-xl font-semibold mb-6">Search Opportunities</h1>
        
        <form action="/search" method="GET" class="flex gap-4 mb-10 max-w-3xl">
            <input type="text" name="q" value="{{ query }}" placeholder="Search roles, skills, or cities..." 
                   class="flex-1 bg-white border border-slate-200 rounded-lg p-3.5 text-sm outline-none focus:border-blue-300 shadow-sm">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3.5 rounded-lg text-sm font-medium transition shadow-sm cursor-pointer">Search</button>
        </form>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for job in results %}
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-lg text-slate-800">{{ job.RoleTitle }}</h3>
                    <p class="text-sm text-slate-500 mt-1">📍 {{ job.City }}</p>
                </div>
                <div class="mt-6 flex justify-end">
                    <button onclick="openJobModal('{{ job.OppID }}')" class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition cursor-pointer">
                        View Details
                    </button>
                </div>
            </div>
            {% else %}
                {% if query %}
                <div class="col-span-full bg-white p-10 rounded-2xl border border-slate-100 text-center">
                    <p class="text-slate-500 font-medium">No results found for "<span class="text-slate-800">{{ query }}</span>". Try a different skill or role.</p>
                </div>
                {% endif %}
            {% endfor %}
        </div>
    </main>

    <div id="job-modal" class="hidden fixed inset-0 bg-[#F0F4F8] z-50 overflow-y-auto">
        <nav class="flex justify-between items-center px-10 py-6 max-w-7xl mx-auto">
            <a href="/" class="text-2xl font-bold text-blue-600">PartWork</a>
            <div class="flex gap-6 text-sm font-medium text-slate-600">
                <button onclick="closeModal('job-modal')" class="hover:text-slate-900 font-bold cursor-pointer">← Back to Search</button>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto px-10 py-6">
            <div class="bg-white p-10 rounded-3xl shadow-sm border border-slate-100">
                <h2 id="mj-title" class="text-3xl font-bold text-slate-800"></h2>
                <p id="mj-company" class="text-lg text-slate-600 mt-2 font-medium"></p>
                <p id="mj-loc" class="text-sm text-slate-400 mt-1 mb-8">📍 </p>
                
                <h3 class="font-bold text-slate-800 mb-3 text-lg">Job Description</h3>
                <p id="mj-desc" class="text-slate-600 leading-relaxed mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-100"></p>
                
                <h3 class="font-bold text-slate-800 mb-3 text-lg">Required Skills</h3>
                <ul id="mj-skills" class="list-disc list-inside text-slate-600 space-y-2 mb-10 pl-2"></ul>
                
                <div class="flex justify-end border-t border-slate-100 pt-6">
                    <button id="mj-apply-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-10 py-3 rounded-xl font-medium transition cursor-pointer shadow-sm">
                        Submit Application
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
    function openJobModal(oppId) {
        document.getElementById('job-modal').classList.remove('hidden');
        
        fetch(`/api/job/${oppId}`)
        .then(res => res.json())
        .then(job => {
            document.getElementById('mj-title').innerText = job.RoleTitle;
            document.getElementById('mj-company').innerText = job.BusinessName;
            document.getElementById('mj-loc').innerText = `📍 ${job.City}`;
            document.getElementById('mj-desc').innerText = job.Description || "No detailed description provided.";
            
            let sHtml = "";
            if (job.Skills && job.Skills.length > 0) {
                job.Skills.forEach(s => {
                    sHtml += `<li>${s}</li>`;
                });
            }
            document.getElementById('mj-skills').innerHTML = sHtml || "<li class='list-none italic text-slate-400'>No specific skills listed.</li>";

            // Handle Apply Button Logic
            const applyBtn = document.getElementById('mj-apply-btn');
            if (job.HasApplied) {
                applyBtn.innerText = "✓ Already Applied";
                applyBtn.className = "bg-slate-200 text-slate-500 px-10 py-3 rounded-xl font-bold cursor-not-allowed";
                applyBtn.onclick = null; // Disable clicking
            } else {
                applyBtn.innerText = "Submit Application";
                applyBtn.className = "bg-blue-500 hover:bg-blue-600 text-white px-10 py-3 rounded-xl font-medium transition cursor-pointer shadow-sm";
                applyBtn.onclick = () => submitApplication(oppId); // Enable clicking
            }
        });
    }

    function submitApplication(oppId) {
        const applyBtn = document.getElementById('mj-apply-btn');
        applyBtn.innerText = "Applying...";
        applyBtn.classList.add('opacity-50', 'cursor-wait');

        fetch(`/api/apply/${oppId}`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            alert(data.message);
            if(data.success) {
                openJobModal(oppId); // Refresh to show "Already Applied"
            } else {
                applyBtn.innerText = "Submit Application";
                applyBtn.classList.remove('opacity-50', 'cursor-wait');
            }
        })
        .catch(err => {
            console.error(err);
            alert("An error occurred. Please try again.");
        });
    }

    function closeModal(id) { 
        document.getElementById(id).classList.add('hidden'); 
    }
    </script>
</body>
</html>
